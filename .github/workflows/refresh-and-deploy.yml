name: Refresh and Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"
    - cron: "0 9 * * *"

jobs:
  refresh-and-deploy:
    name: Refresh and Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    concurrency:
      group: scd5min-worker-deploy
      cancel-in-progress: true
    env:
      PRODUCTION_SITE_URL: ${{ vars.PRODUCTION_SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Worker assets
        run: npm run build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run

      - name: Deploy to Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
